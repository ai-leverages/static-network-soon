<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Leverage Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --ink: #111;
  --soft: #888;
  --muted: #bbb;
  --rule: #e0deda;
  --white: #fff;
  --serif: 'Instrument Serif', Georgia, serif;
  --mono: 'Geist Mono', 'Courier New', monospace;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  font-weight: 300;
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  height: 56px;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
}
.logo { font-size: 12px; letter-spacing: 0.08em; color: var(--ink); text-decoration: none; cursor: pointer; }
.nav-center { display: flex; gap: 0; }
.nav-link {
  font-size: 11px; letter-spacing: 0.06em; color: var(--soft);
  padding: 0 20px; height: 56px; display: flex; align-items: center;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s; text-decoration: none;
  margin-bottom: -1px;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--ink); border-bottom-color: var(--ink); }
.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--soft); }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #3a3; animation: blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }
.nav-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 7px 16px; border: 1px solid var(--rule); background: transparent;
  color: var(--soft); cursor: pointer; text-decoration: none;
  transition: all 0.15s; display: inline-flex; align-items: center;
}
.nav-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ── PAGE CONTAINER ── */
#app { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── SHARED LAYOUT ── */
.hero {
  padding: 80px 48px 64px;
  border-bottom: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end;
}
.hero-full { grid-template-columns: 1fr; max-width: 720px; }
.hero h1 {
  font-family: var(--serif); font-size: clamp(44px,5.5vw,80px); font-weight: 400;
  line-height: 1.05; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 28px;
}
.hero h1 em { font-style: italic; color: var(--soft); }
.hero-desc { font-size: 14px; line-height: 1.8; color: var(--soft); margin-bottom: 36px; }
.hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  padding: 10px 22px; text-decoration: none; border: 1px solid var(--rule);
  color: var(--soft); background: transparent; cursor: pointer;
  transition: all 0.15s; display: inline-block;
}
.btn:hover { border-color: var(--ink); color: var(--ink); }
.btn-fill { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn-fill:hover { background: #333; color: var(--bg); border-color: #333; }

/* ── STATS BAR ── */
.stats { display: grid; border-bottom: 1px solid var(--rule); }
.stats-5 { grid-template-columns: repeat(5,1fr); }
.stats-4 { grid-template-columns: repeat(4,1fr); }
.stats-3 { grid-template-columns: repeat(3,1fr); }
.stat { padding: 28px 48px; border-right: 1px solid var(--rule); }
.stat:last-child { border-right: none; }
.stat-val { font-family: var(--serif); font-size: 30px; font-weight: 400; color: var(--ink); display: block; line-height: 1; margin-bottom: 6px; }
.stat-label { font-size: 10px; letter-spacing: 0.1em; color: var(--soft); text-transform: uppercase; }

/* ── SECTION LAYOUT ── */
.section { display: grid; grid-template-columns: 200px 1fr; border-bottom: 1px solid var(--rule); }
.section-aside { padding: 56px 48px; border-right: 1px solid var(--rule); }
.section-num { font-size: 10px; letter-spacing: 0.15em; color: var(--muted); display: block; margin-bottom: 10px; }
.section-title { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--ink); }
.section-body { padding: 56px 64px; }

/* ── ARCH DIAGRAM ── */
.arch { display: flex; align-items: center; margin-bottom: 48px; }
.arch-node { flex: 1; text-align: center; }
.arch-box { display: inline-block; padding: 9px 14px; border: 1px solid var(--rule); font-size: 11px; letter-spacing: 0.06em; color: var(--ink); background: var(--bg); }
.arch-box.active { border-color: var(--ink); }
.arch-label { font-size: 9px; letter-spacing: 0.1em; color: var(--soft); text-transform: uppercase; margin-top: 8px; display: block; }
.arch-arrow { font-size: 12px; color: var(--muted); flex-shrink: 0; width: 20px; text-align: center; }

/* ── FEATURES ── */
.features { display: grid; grid-template-columns: 1fr 1fr; }
.feature { padding: 28px 0; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 150px 1fr; gap: 20px; align-items: start; }
.feature:nth-last-child(-n+2) { border-bottom: none; }
.feature:nth-child(odd) { padding-right: 40px; border-right: 1px solid var(--rule); }
.feature:nth-child(even) { padding-left: 40px; }
.feature-title { font-size: 11px; letter-spacing: 0.08em; color: var(--ink); padding-top: 2px; text-transform: uppercase; }
.feature-desc { font-size: 12px; line-height: 1.75; color: var(--soft); }

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--soft); padding-bottom: 14px; border-bottom: 1px solid var(--rule); font-weight: 400; }
tbody td { padding: 14px 0; border-bottom: 1px solid var(--rule); font-size: 12px; color: var(--ink); }
tbody tr:last-child td { border-bottom: none; }
.tdsoft { color: var(--soft); }
.status-cell { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--soft); }

/* ── CODE BLOCK ── */
.code-wrap { background: var(--white); border: 1px solid var(--rule); padding: 32px; margin-top: 36px; }
.code-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--soft); margin-bottom: 20px; display: block; }
pre { font-family: var(--mono); font-size: 12px; line-height: 1.9; color: var(--ink); overflow-x: auto; }
.cm { color: #ccc; } .ck { color: #555; } .cs { color: #888; } .cv { color: #111; }

/* ── SLA GRID ── */
.sla-grid { display: flex; gap: 0; }
.sla-item { flex: 1; padding-right: 40px; border-right: 1px solid var(--rule); margin-right: 40px; }
.sla-item:last-child { border-right: none; margin-right: 0; padding-right: 0; }
.sla-val { font-family: var(--serif); font-size: 34px; font-weight: 400; color: var(--ink); display: block; line-height: 1; margin-bottom: 7px; }
.sla-label { font-size: 10px; letter-spacing: 0.1em; color: var(--soft); text-transform: uppercase; }

/* ── PROSE ── */
.prose { max-width: 600px; }
.prose p { font-size: 13px; line-height: 1.85; color: var(--soft); margin-bottom: 20px; }
.prose p:last-child { margin-bottom: 0; }
.prose h3 { font-family: var(--serif); font-size: 20px; font-weight: 400; color: var(--ink); margin-bottom: 14px; margin-top: 36px; }
.prose h3:first-child { margin-top: 0; }
.prose ul { list-style: none; margin-bottom: 20px; }
.prose ul li { font-size: 13px; line-height: 1.85; color: var(--soft); padding-left: 16px; position: relative; }
.prose ul li::before { content: '—'; position: absolute; left: 0; color: var(--muted); }

/* ── STATUS PAGE ── */
.status-grid { display: flex; flex-direction: column; gap: 0; }
.status-row { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid var(--rule); }
.status-row:last-child { border-bottom: none; }
.status-name { font-size: 12px; color: var(--ink); }
.status-region { font-size: 10px; letter-spacing: 0.08em; color: var(--soft); text-transform: uppercase; margin-top: 2px; }
.status-pill { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border: 1px solid; }
.pill-green { color: #2a7a2a; border-color: #c0ddc0; background: #f0f7f0; }
.pill-yellow { color: #7a6a1a; border-color: #ddd0a0; background: #faf8e8; }
.pill-red { color: #7a2a2a; border-color: #ddc0c0; background: #f7f0f0; }
.uptime-bar { display: flex; gap: 2px; margin-top: 6px; }
.uptime-tick { width: 4px; height: 20px; background: var(--rule); border-radius: 1px; }
.uptime-tick.ok { background: #3a3; }
.uptime-tick.warn { background: #ca3; }
.uptime-tick.down { background: #c33; }
.incident-list { margin-top: 0; }
.incident { padding: 20px 0; border-bottom: 1px solid var(--rule); }
.incident:last-child { border-bottom: none; }
.incident-date { font-size: 10px; letter-spacing: 0.1em; color: var(--soft); text-transform: uppercase; margin-bottom: 6px; }
.incident-title { font-size: 13px; color: var(--ink); margin-bottom: 6px; }
.incident-body { font-size: 12px; line-height: 1.7; color: var(--soft); }

/* ── DOCS PAGE ── */
.docs-layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 57px); }
.docs-sidebar { border-right: 1px solid var(--rule); padding: 40px 0; position: sticky; top: 57px; align-self: start; height: calc(100vh - 57px); overflow-y: auto; }
.docs-sidebar-group { margin-bottom: 32px; }
.docs-sidebar-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 0 28px; margin-bottom: 8px; display: block; }
.docs-sidebar-link { display: block; font-size: 12px; color: var(--soft); padding: 6px 28px; cursor: pointer; transition: color 0.15s; text-decoration: none; }
.docs-sidebar-link:hover { color: var(--ink); }
.docs-sidebar-link.active { color: var(--ink); border-left: 2px solid var(--ink); margin-left: -2px; padding-left: 26px; }
.docs-content { padding: 56px 64px; max-width: 760px; }
.docs-content h1 { font-family: var(--serif); font-size: 40px; font-weight: 400; color: var(--ink); margin-bottom: 16px; line-height: 1.1; }
.docs-content .tagline { font-size: 14px; color: var(--soft); line-height: 1.7; margin-bottom: 48px; }
.docs-content h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--ink); margin-bottom: 14px; margin-top: 48px; }
.docs-content h3 { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); margin-bottom: 12px; margin-top: 32px; }
.docs-content p { font-size: 13px; line-height: 1.85; color: var(--soft); margin-bottom: 16px; }
.docs-content ul, .docs-content ol { padding-left: 0; list-style: none; margin-bottom: 16px; }
.docs-content ul li, .docs-content ol li { font-size: 13px; line-height: 1.85; color: var(--soft); padding-left: 20px; position: relative; margin-bottom: 4px; }
.docs-content ul li::before { content: '–'; position: absolute; left: 0; color: var(--muted); }
.docs-content ol { counter-reset: ol; }
.docs-content ol li { counter-increment: ol; }
.docs-content ol li::before { content: counter(ol) '.'; position: absolute; left: 0; color: var(--muted); font-size: 11px; }
.docs-content .inline-code { font-family: var(--mono); font-size: 12px; background: var(--white); border: 1px solid var(--rule); padding: 2px 7px; }
.callout { background: var(--white); border: 1px solid var(--rule); border-left: 3px solid var(--ink); padding: 20px 24px; margin: 24px 0; }
.callout-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--soft); margin-bottom: 8px; }
.callout p { margin-bottom: 0; }

/* ── ABOUT ── */
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: none; }
.about-block { padding: 48px 64px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.about-block:nth-child(even) { border-right: none; }
.about-block:nth-last-child(-n+2) { border-bottom: none; }
.about-block h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--ink); margin-bottom: 16px; }
.about-block p { font-size: 13px; line-height: 1.85; color: var(--soft); }
.team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; }
.team-member { padding: 32px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.team-member:nth-child(3n) { border-right: none; }
.team-member:nth-last-child(-n+3) { border-bottom: none; }
.team-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--rule); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.team-name { font-size: 13px; color: var(--ink); margin-bottom: 4px; }
.team-role { font-size: 11px; letter-spacing: 0.06em; color: var(--soft); text-transform: uppercase; margin-bottom: 10px; }
.team-bio { font-size: 12px; line-height: 1.7; color: var(--soft); }

/* ── PEERING PAGE ── */
.peering-intro { max-width: 640px; font-size: 13px; line-height: 1.85; color: var(--soft); margin-bottom: 48px; }
.peering-section { margin-bottom: 48px; }
.peering-section h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
.req-list { display: flex; flex-direction: column; gap: 0; }
.req-item { display: flex; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--rule); font-size: 12px; }
.req-item:last-child { border-bottom: none; }
.req-label { width: 160px; flex-shrink: 0; color: var(--soft); }
.req-val { color: var(--ink); }

/* ── FOOTER ── */
footer { border-top: 1px solid var(--rule); padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-logo { font-size: 11px; letter-spacing: 0.08em; color: var(--ink); cursor: pointer; }
.footer-links { list-style: none; display: flex; gap: 28px; }
.footer-links li span { font-size: 11px; letter-spacing: 0.06em; color: var(--soft); cursor: pointer; transition: color 0.15s; }
.footer-links li span:hover { color: var(--ink); }
.footer-copy { font-size: 11px; color: var(--muted); }

/* ── RESPONSIVE ── */
@media(max-width:900px){
  nav{padding:0 24px;}
  .nav-center{display:none;}
  .hero{grid-template-columns:1fr;padding:48px 24px;}
  .stats-5,.stats-4{grid-template-columns:repeat(2,1fr);}
  .stat{padding:20px 24px;}
  .section{grid-template-columns:1fr;}
  .section-aside{padding:32px 24px 0;border-right:none;}
  .section-body{padding:24px;}
  .features{grid-template-columns:1fr;}
  .feature:nth-child(odd){border-right:none;padding-right:0;}
  .feature:nth-child(even){padding-left:0;}
  .feature:nth-last-child(-n+2){border-bottom:1px solid var(--rule);}
  .feature:last-child{border-bottom:none;}
  .sla-grid{flex-direction:column;gap:24px;}
  .sla-item{border-right:none;margin-right:0;padding-right:0;}
  footer{padding:24px;flex-direction:column;align-items:flex-start;}
  .docs-layout{grid-template-columns:1fr;}
  .docs-sidebar{display:none;}
  .docs-content{padding:32px 24px;}
  .team-grid{grid-template-columns:1fr 1fr;}
  .about-grid{grid-template-columns:1fr;}
  .about-block{border-right:none;border-bottom:1px solid var(--rule);}
  .about-block:last-child{border-bottom:none;}
}
</style>
</head>

<nav>
  <span class="logo" onclick="navigate('home')">aileverage.network</span>
  <div class="nav-center">
    <span class="nav-link" data-page="home" onclick="navigate('home')">Overview</span>
    <span class="nav-link" data-page="docs" onclick="navigate('docs')">Docs</span>

// ── PAGES ──────────────────────────────────────────────────

function pageHome() {

    <div class="docs-content">
      <h1>Introduction</h1>
      <p class="tagline">aileverage.network is the upstream P2P network layer that Aeplo Cloud routes all AI inference workloads through. This documentation covers everything needed to connect, configure, and operate the integration.</p>

      <h2>What is aileverage.network?</h2>
      <p>aileverage.network is a purpose-built peer-to-peer mesh network designed for AI inference workloads. Rather than routing traffic through centralised infrastructure, it distributes requests across a globally distributed set of authenticated peer nodes, selecting routes based on latency, available capacity, and workload type.</p>
      <p>Aeplo Cloud sits in the consumer tier of this network. Every inference request — whether for token generation, embedding computation, or multimodal processing — passes through the AI Leverage Gateway before being distributed across the mesh to an appropriate endpoint.</p>

      <div class="callout">
        <div class="callout-label">Note</div>
        <p>aileverage.network is private infrastructure exclusively for Aeplo Cloud. This documentation is intended for Aeplo Cloud operators and infrastructure engineers.</p>
      </div>

      <h2>Architecture overview</h2>
      <p>The network has three logical tiers:</p>
      <ol>
        <li><strong>Consumer tier</strong> — Aeplo Cloud. Initiates requests, holds peer certificates, configures routing preferences.</li>
        <li><strong>Gateway tier</strong> — The AI Leverage Gateway cluster. Authenticates consumers, applies routing policy, manages session state.</li>
        <li><strong>Mesh tier</strong> — The P2P core. Distributed peer nodes that relay and serve inference requests. Self-healing, capacity-aware, globally distributed.</li>
      </ol>

      <h2>Protocol</h2>
      <p>All communication uses the AI Leverage Network protocol (<span class="inline-code">ALN v2.1</span>), built on QUIC for transport. ALN provides:</p>
      <ul>
        <li>Multiplexed streams for concurrent inference requests</li>
        <li>First-class streaming token support with backpressure</li>
        <li>Batched embedding requests with result ordering guarantees</li>
        <li>Structured error payloads with retryability hints</li>
        <li>Built-in telemetry framing for latency and capacity metrics</li>
      </ul>

      <h2>Quick start</h2>
      <p>To connect Aeplo Cloud to aileverage.network, you need a peer certificate issued by the AI Leverage CA and a valid configuration file.</p>

      <h3>Step 1 — Obtain peer credentials</h3>
      <p>Contact the AI Leverage NOC to receive your <span class="inline-code">peer.crt</span> and <span class="inline-code">peer.key</span>. Certificates are issued per-deployment and rotate every 90 days.</p>

      <h3>Step 2 — Install the gateway agent</h3>
      <div class="code-wrap">
        <span class="code-label">Shell</span>
        <pre><span class="cm"># Install the ALN gateway agent</span>
curl -sSL https://install.aileverage.network/agent | sh

<span class="cm"># Verify installation</span>
aln-agent --version
<span class="cs">aln-agent 2.1.4</span></pre>
      </div>

      <h3>Step 3 — Configure the connection</h3>
      <div class="code-wrap">
        <span class="code-label">aeplo-upstream.yaml</span>
        <pre><span class="ck">upstream</span>:
  <span class="ck">provider</span>:         <span class="cs">"aileverage.network"</span>
  <span class="ck">gateway</span>:          <span class="cs">"gw.aileverage.network:9443"</span>
  <span class="ck">auth</span>:
    <span class="ck">mode</span>:             <span class="cs">"mtls"</span>
    <span class="ck">cert</span>:             <span class="cs">"/etc/aeplo/peer.crt"</span>
    <span class="ck">key</span>:              <span class="cs">"/etc/aeplo/peer.key"</span>
  <span class="ck">routing</span>:
    <span class="ck">strategy</span>:         <span class="cs">"latency-first"</span>
    <span class="ck">fallback</span>:         <span class="cs">"capacity-weighted"</span>
    <span class="ck">regions</span>:          [<span class="cs">"eu-west"</span>, <span class="cs">"us-east"</span>]
  <span class="ck">protocol</span>:         <span class="cs">"aln/2.1"</span>
  <span class="ck">max_batch_size</span>:   <span class="cv">128</span>
  <span class="ck">keepalive</span>:        <span class="cs">"30s"</span>
  <span class="ck">timeout</span>:          <span class="cs">"10s"</span></pre>
      </div>

      <h3>Step 4 — Start and verify</h3>
      <div class="code-wrap">
        <span class="code-label">Shell</span>
        <pre><span class="cm"># Start the agent</span>
aln-agent start --config /etc/aeplo/upstream.yaml

<span class="cm"># Check connection status</span>
aln-agent status
<span class="cs">✓ Connected to gw.aileverage.network:9443
✓ Peer authenticated (cert expires 2026-06-01)
✓ Active routes: eu-west (11ms), us-east (34ms)
✓ Throughput: 2.1 Gbps ↑ / 8.4 Gbps ↓</span></pre>
      </div>

      <h2>Routing strategies</h2>
      <p>Three routing strategies are available:</p>
      <ul>
        <li><span class="inline-code">latency-first</span> — Routes to the peer node with the lowest observed round-trip time. Recommended for interactive inference.</li>
        <li><span class="inline-code">capacity-weighted</span> — Routes proportionally to available node capacity. Recommended for batch workloads.</li>
        <li><span class="inline-code">region-pinned</span> — Routes exclusively to nodes in specified regions. Use when data residency requirements apply.</li>
      </ul>

      <h2>Failover</h2>
      <p>The mesh detects node failures within 200 ms and reroutes in-flight requests automatically. No configuration is required. For requests mid-stream, the protocol supports seamless handoff: the receiving node continues from the last acknowledged token, with no loss of context.</p>
      <p>If all nodes in a preferred region become unavailable, routing automatically falls back to the next closest region as defined by the <span class="inline-code">fallback</span> strategy. Fallback events are reported in telemetry.</p>

      <h2>Telemetry</h2>
      <p>The agent exposes a Prometheus-compatible metrics endpoint at <span class="inline-code">localhost:9090/metrics</span> by default. Key metrics include:</p>
      <ul>
        <li><span class="inline-code">aln_request_latency_ms</span> — Histogram of end-to-end request latencies</li>
        <li><span class="inline-code">aln_active_connections</span> — Number of active peer connections</li>
        <li><span class="inline-code">aln_throughput_bytes</span> — Bytes transferred, labelled by direction</li>
        <li><span class="inline-code">aln_failover_total</span> — Count of failover events by region</li>
        <li><span class="inline-code">aln_cert_expiry_seconds</span> — Time until peer certificate expiry</li>
      </ul>
    </div>
  </div>
  `;
}

const pages = { home: pageHome, docs: pageDocs, status: pageStatus, peering: pagePeering, about: pageAbout };

function navigate(page) {
  const app = document.getElementById('app');
  app.style.opacity = '0';
  setTimeout(() => {
    app.innerHTML = pages[page] ? pages[page]() : pageHome();
    app.style.animation = 'none';
    requestAnimationFrame(() => {
      app.style.animation = 'fadeIn 0.2s ease';
      app.style.opacity = '1';
    });
    window.scrollTo(0, 0);
  }, 100);

  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
}

// Init
navigate('home');
